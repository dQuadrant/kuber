name: Build Multiarch Docker Images

on:
  push:
    branches:
      - master
      - develop
      - dev
    tags:
      - "*"

env:
  IMAGE: ghcr.io/dquadrant/kuber

jobs:
  build:
    if: ${{ !github.event.repository.fork }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v
        with:
          fetch-depth: 0

      - name: Cache cabal store
        uses: actions/cache@v5
        with:
          path: dist-newstyle/build/docker/cabal-cache
          key: cabal-${{ matrix.arch }}-${{ hashFiles('kuber.cabal', 'kuber-hydra/kuber-hydra.cabal') }}
          restore-keys: |
            cabal-${{ matrix.arch }}-

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cabal update
        run: ./.ci/build cabal update

      - name: Build image
        run: |
          IMAGE_TAG="${{ env.IMAGE }}:$(git rev-parse HEAD)-${{ matrix.arch }}"
          ./.ci/build -t "$IMAGE_TAG"

      - name: Push image
        run: |
          IMAGE_TAG="${{ env.IMAGE }}:$(git rev-parse HEAD)-${{ matrix.arch }}"
          docker push "$IMAGE_TAG"

  manifest:
    if: ${{ !github.event.repository.fork }}
    needs: build
    runs-on: ubuntu-latest

    permissions:
      packages: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          BASE="${{ env.IMAGE }}"
          docker buildx imagetools create \
            -t "${BASE}:${COMMIT_SHA}" \
            "${BASE}:${COMMIT_SHA}-amd64" \
            "${BASE}:${COMMIT_SHA}-arm64"
          
          # Tag as latest if on master or if it's a version tag
          if [[ "${{ github.ref }}" == "refs/heads/master" ]] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            docker buildx imagetools create -t "${BASE}:latest" "${BASE}:${COMMIT_SHA}"
          fi

          # Tag with the version name if it's a tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            docker buildx imagetools create -t "${BASE}:${TAG_NAME}" "${BASE}:${COMMIT_SHA}"
          fi

      - name: Cleanup temporary architecture images
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          OWNER="${{ github.repository_owner }}"
          PACKAGE_NAME="kuber"

          for ARCH in amd64 arm64; do
            TAG="${COMMIT_SHA}-${ARCH}"
            echo "Looking up version ID for tag: ${TAG}"
            VERSION_ID=$(gh api "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions" \
              --paginate \
              --jq ".[] | select(.metadata.container.tags[] == \"${TAG}\") | .id")
            if [ -n "$VERSION_ID" ]; then
              echo "Deleting ${TAG} (version ID: ${VERSION_ID})"
              gh api --method DELETE "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions/${VERSION_ID}"
            else
              echo "No version found for tag ${TAG}, skipping."
            fi
          done

  build-hydra:
    if: startsWith(github.ref, 'refs/tags/')
    needs: manifest
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push kuber-hydra image
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --build-arg BASE_TAG="${COMMIT_SHA}-${{ matrix.arch }}" \
            -f ./.ci/Dockerfile.hydra \
            -t "ghcr.io/dquadrant/kuber-hydra:${COMMIT_SHA}-${{ matrix.arch }}" \
            --push \
            .

  manifest-hydra:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-hydra
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push kuber-hydra manifest
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          TAG="${{ github.ref_name }}"
          BASE="ghcr.io/dquadrant/kuber-hydra"
          docker buildx imagetools create \
            -t "${BASE}:${COMMIT_SHA}" \
            -t "${BASE}:${TAG}" \
            "${BASE}:${COMMIT_SHA}-amd64" \
            "${BASE}:${COMMIT_SHA}-arm64"
