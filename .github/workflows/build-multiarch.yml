name: Build Multiarch Docker Images

on:
  push:
    branches:
      - master
      - develop
      - dev

env:
  IMAGE: ghcr.io/dquadrant/kuber

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: dist-newstyle/build/docker/cabal-cache
          key: cabal-${{ matrix.arch }}-${{ hashFiles('kuber.cabal', 'kuber-hydra/kuber-hydra.cabal') }}
          restore-keys: |
            cabal-${{ matrix.arch }}-

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cabal update
        run: ./.ci/build cabal update

      - name: Build image
        run: |
          IMAGE_TAG="${{ env.IMAGE }}:$(git rev-parse HEAD)-${{ matrix.arch }}"
          ./.ci/build -t "$IMAGE_TAG"

      - name: Push image
        run: |
          IMAGE_TAG="${{ env.IMAGE }}:$(git rev-parse HEAD)-${{ matrix.arch }}"
          docker push "$IMAGE_TAG"

  manifest:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          BASE="${{ env.IMAGE }}"
          docker buildx imagetools create \
            -t "${BASE}:${COMMIT_SHA}" \
            "${BASE}:${COMMIT_SHA}-amd64" \
            "${BASE}:${COMMIT_SHA}-arm64"
